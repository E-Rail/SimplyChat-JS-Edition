<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyChat - Lightweight Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="auth-form">
                <h2>Welcome to SimplyChat</h2>
                <p>Login to your account</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="modalUsername">Username</label>
                        <input type="text" id="modalUsername" name="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="modalPassword">Password</label>
                        <input type="password" id="modalPassword" name="password" required>
                    </div>
                    
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                
                <p class="auth-switch">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <!-- Contacts Sidebar -->
        <div class="contacts-sidebar">
            <div class="contacts-header">
                <h2>Contacts</h2>
            </div>
            <div id="contactsList" class="contacts-list">
                <!-- Contacts will be populated here -->
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <h2>SimplyChat</h2>
                <div class="user-info">
                    <span id="currentUser">User</span>
                    <a href="settings.html" style="color: #333; margin-left: 10px; text-decoration: none;">⚙️</a>
                </div>
            </div>
            
            <div id="messages" class="messages"></div>
            
            <div class="input-area">
                <input id="messageInput" type="text" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="cloudService.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    
    <script>
        // Show login modal on page load
        document.addEventListener('DOMContentLoaded', function() {
            const loginModal = document.getElementById('loginModal');
            const currentUser = localStorage.getItem('currentUser');
            
            if (!currentUser) {
                loginModal.style.display = 'block';
            }
            
            // Handle modal login form submission
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('modalUsername').value;
                const password = document.getElementById('modalPassword').value;
                
                const result = login(username, password);
                
                if (result.success) {
                    loginModal.style.display = 'none';
                    // Reload to show chat interface
                    location.reload();
                } else {
                    alert(result.message);
                }
            });
        });
    </script>
</body>
</html>
