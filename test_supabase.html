<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Test</title>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <button id="testConnection">Test Connection</button>
    <div id="result"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase with your project credentials
        const supabaseUrl = 'https://xcshpvtjlegnyovbzjfe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2hwdnRqbGVnbnlvdmJ6amZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MTYxNjEsImV4cCI6MjA4MDk5MjE2MX0.nWvHwrzGxsClh_LTht1KHO9chLaRbaQWo92jXDCH30A';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        document.getElementById('testConnection').addEventListener('click', async function() {
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p style="color: green;">Success! Connected to Supabase. Found ' + (data ? data.length : 0) + ' users.</p>';
                }
            } catch (err) {
                document.getElementById('result').innerHTML = '<p style="color: red;">Exception: ' + err.message + '</p>';
            }
        });
    </script>
</body>
</html>
