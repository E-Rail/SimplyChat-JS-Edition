<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Test</title>
</head>
<body>
    <h1>Registration Test</h1>
    <form id="testRegisterForm">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Register</button>
    </form>
    <div id="result"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase with your project credentials
        const supabaseUrl = 'https://xcshpvtjlegnyovbzjfe.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2hwdnRqbGVnbnlvdmJ6amZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0MTYxNjEsImV4cCI6MjA4MDk5MjE2MX0.nWvHwrzGxsClh_LTht1KHO9chLaRbaQWo92jXDCH30A';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <script src="cloudService.js"></script>
    <script>
        document.getElementById('testRegisterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const cloudService = new CloudService();
                const result = await cloudService.registerUser(username, email, password);
                
                if (result.success) {
                    document.getElementById('result').innerHTML = '<p style="color: green;">Success: ' + result.message + '</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + result.message + '</p>';
                }
            } catch (err) {
                document.getElementById('result').innerHTML = '<p style="color: red;">Exception: ' + err.message + '</p>';
            }
        });
    </script>
</body>
</html>
